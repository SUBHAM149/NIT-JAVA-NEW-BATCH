<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>we are learning Math object in js today</h2>
    <script>
      console.log("working");
      console.log(Math);
      console.log(Math.PI);
      console.log(Math.E);

      console.clear();

      let number = 3.8;
      console.log(Math.floor(number)); // same number
      console.log(Math.ceil(number)); // next one
      console.log(Math.round(number)); // both

      console.log(Math.pow(number, 3)); // number , power

      console.clear();

      console.log(Math.random()); // any value b/w 0 to 1

      //   print any value b/w 3 to 10
      let max = 30;
      let min = 10;
      console.log(Math.floor(Math.random() * (max - min) + min));
    </script>
  </body>
</html>
