<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Employee</title>

<style>
body {
	font-family: Arial, sans-serif;
	background: #f2f2f2;
}

.container {
	width: 450px;
	margin: 50px auto;
	background: #fff;
	padding: 25px;
	border-radius: 10px;
	box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
}

h2 {
	text-align: center;
	color: #333;
}

label {
	font-weight: bold;
}

input {
	width: 100%;
	padding: 10px;
	margin: 8px 0 15px 0;
	border: 1px solid #ccc;
	border-radius: 5px;
	box-sizing: border-box;
}

button {
	width: 100%;
	padding: 12px;
	background: #28a745;
	color: white;
	border: none;
	border-radius: 5px;
	font-size: 16px;
	cursor: pointer;
}

button:hover {
	background: #218838;
}

a {
	text-decoration: none;
	display: block;
	text-align: center;
	margin-top: 15px;
	color: blue;
}
</style>

</head>
<body>

	<div class="container">

		<h2>Add Employee</h2>

		<form th:action="@{/employee/save}" th:object="${employee}"
			method="post">

			<label>Employee Name</label> <input type="text" th:field="*{name}"
				placeholder="Enter Employee Name" required> <label>Department</label>
			<input type="text" th:field="*{department}"
				placeholder="Enter Department" required> <label>Email</label>
			<input type="email" th:field="*{email}" placeholder="Enter Email"
				required> <label>Mobile Number</label> <input type="number"
				th:field="*{mob_num}" placeholder="Enter Mobile Number" required>

			<button type="submit">Save Employee</button>

		</form>

		<a th:href="@{/employee/all}">View All Employees</a>
        <a th:href="@{/}">🏠 Back to Home</a>
	</div>

</body>
</html>
