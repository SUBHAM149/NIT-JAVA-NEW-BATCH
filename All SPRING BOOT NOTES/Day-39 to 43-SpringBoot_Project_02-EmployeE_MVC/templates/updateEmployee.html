<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Update Employee</title>

<style>
body {
	font-family: Arial;
	background: #f4f4f4;
}

.container {
	width: 400px;
	margin: auto;
	margin-top: 50px;
	background: white;
	padding: 20px;
	border-radius: 10px;
}

input {
	width: 100%;
	padding: 10px;
	margin: 8px 0;
}

button {
	padding: 10px 20px;
	background: orange;
	color: white;
	border: none;
}
</style>

</head>

<body>

	<div class="container">

		<h2>Update Employee</h2>

		<form th:action="@{/employee/update/{id}(id=${employee.id})}"
			th:object="${employee}" method="post">

			<input type="hidden" th:field="*{id}"> <input type="text"
				th:field="*{name}"> <input type="text"
				th:field="*{department}"> <input type="email"
				th:field="*{email}"> <input type="number"
				th:field="*{mob_num}">

			<button type="submit">Update Employee</button>

		</form>
     <a th:href="@{/}">🏠 Back to Home</a>
	</div>

</body>
</html>
